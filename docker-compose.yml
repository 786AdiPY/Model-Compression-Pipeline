version: "3.9"

# Shared volume where all pipeline steps exchange artifacts
volumes:
  artifacts:
  mlflow_data:

# Shared data volume (populated by generate step)
networks:
  pipeline:

services:

  # ── MLflow tracking server ─────────────────────────────────────────────────
  mlflow:
    build: ./mlflow
    container_name: mlflow
    env_file: ./mlflow/mlflow.env
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - pipeline
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Generate synthetic data ────────────────────────────────────────────────
  generate:
    image: python:3.11-slim
    container_name: generate
    volumes:
      - ./data:/app/data
    command: >
      bash -c "pip install pandas numpy scikit-learn -q &&
               python /app/data/generate.py --out /app/data"
    working_dir: /app
    networks:
      - pipeline

  # ── Train XGBoost ──────────────────────────────────────────────────────────
  train:
    build: ./train
    container_name: train
    depends_on:
      mlflow:
        condition: service_healthy
      generate:
        condition: service_completed_successfully
    volumes:
      - ./data:/data:ro
      - artifacts:/artifacts
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DATA_DIR: /data
      MODEL_OUT: /artifacts/model.pkl
    networks:
      - pipeline

  # ── Compress pkl → ONNX → TRT ──────────────────────────────────────────────
  compress:
    build: ./compress
    container_name: compress
    depends_on:
      train:
        condition: service_completed_successfully
    volumes:
      - artifacts:/artifacts
    environment:
      MODEL_PKL:  /artifacts/model.pkl
      MODEL_ONNX: /artifacts/model_fp32.onnx
      MODEL_TRT:  /artifacts/model_int8.trt
      META_PATH:  /artifacts/model_meta.json
    networks:
      - pipeline

  # ── Benchmark all 3 model variants ────────────────────────────────────────
  benchmark:
    build: ./benchmark
    container_name: benchmark
    depends_on:
      compress:
        condition: service_completed_successfully
    volumes:
      - ./data:/data:ro
      - artifacts:/artifacts
    environment:
      MODEL_PKL:   /artifacts/model.pkl
      MODEL_ONNX:  /artifacts/model_fp32.onnx
      MODEL_TRT:   /artifacts/model_int8.trt
      TEST_CSV:    /data/test.csv
      RESULTS_OUT: /artifacts/benchmark_results.json
      RUNS:        "200"
    networks:
      - pipeline

  # ── Quality gate ───────────────────────────────────────────────────────────
  gate:
    build: ./gate
    container_name: gate
    depends_on:
      benchmark:
        condition: service_completed_successfully
    volumes:
      - artifacts:/artifacts
    environment:
      RESULTS_PATH:    /artifacts/benchmark_results.json
      GATE_REPORT_OUT: /artifacts/gate_report.json
      MAX_ACC_DROP:    "0.01"
      MAX_AUC_DROP:    "0.01"
    networks:
      - pipeline

  # ── Register best model ────────────────────────────────────────────────────
  registry:
    build: ./registry
    container_name: registry
    depends_on:
      gate:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    volumes:
      - artifacts:/artifacts
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      RESULTS_PATH:        /artifacts/benchmark_results.json
      GATE_REPORT:         /artifacts/gate_report.json
      MODEL_PKL:           /artifacts/model.pkl
      MODEL_ONNX:          /artifacts/model_fp32.onnx
      MODEL_TRT:           /artifacts/model_int8.trt
      REGISTRY_NAME:       churn-detector
    networks:
      - pipeline

  # ── Serve (FastAPI) ────────────────────────────────────────────────────────
  serve:
    build: ./serve
    container_name: serve
    depends_on:
      registry:
        condition: service_completed_successfully
    volumes:
      - artifacts:/artifacts:ro
    environment:
      MODEL_PKL:  /artifacts/model.pkl
      MODEL_ONNX: /artifacts/model_fp32.onnx
      MODEL_TRT:  /artifacts/model_int8.trt
    ports:
      - "8000:8000"
    networks:
      - pipeline
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Drift monitor ──────────────────────────────────────────────────────────
  monitor:
    build: ./monitor
    container_name: monitor
    depends_on:
      serve:
        condition: service_healthy
    volumes:
      - ./data:/data:ro
      - artifacts:/artifacts
    environment:
      TRAIN_STATS_PATH: /artifacts/model_train_stats.json
      INCOMING_CSV:     /data/test.csv
      DRIFT_REPORT_OUT: /artifacts/drift_report.json
      PSI_WARN:         "0.1"
      PSI_ALERT:        "0.2"
    networks:
      - pipeline
